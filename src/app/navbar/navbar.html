<nav class="navbar" [class.scrolled]="isScrolled" role="navigation" aria-label="Main navigation">
  <div class="container navbar-inner">

    <a routerLink="/" class="navbar-brand" aria-label="Clarence Lane Parungao - Home">
      <img src="Logo.png" alt="Laney logo" class="logo-img">
      <span class="brand-name">Laney<span class="accent">.</span></span>
    </a>

    <button
      class="hamburger"
      [class.open]="menuOpen"
      (click)="toggleMenu()"
      aria-label="Toggle navigation menu"
      [attr.aria-expanded]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links" [class.open]="menuOpen" role="list">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/about" routerLinkActive="active" (click)="closeMenu()">About</a></li>
      <li><a routerLink="/projects" routerLinkActive="active" (click)="closeMenu()">Projects</a></li>
      <li><a routerLink="/resume" routerLinkActive="active" (click)="closeMenu()">Resume</a></li>
      <li>
        <a routerLink="/contact" class="btn btn-primary nav-cta" (click)="closeMenu()">
          Contact Me
        </a>
      </li>
    </ul>

  </div>
</nav>
